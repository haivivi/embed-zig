name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  IDF_PATH: /usr/local/src/esp-idf

jobs:
  std:
    name: std (ubuntu + macOS)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-repo
            ~/.cache/bazel-disk
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'extensions.bzl') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Build cross-platform libraries
        run: |
          bazel build --config=ci \
            //lib/trait \
            //lib/hal \
            //lib/pkg/async/channel \
            //lib/pkg/async/waitgroup \
            //lib/pkg/async/cancellation \
            //lib/platform/std

      - name: Test cross-platform libraries
        run: |
          bazel test --config=ci \
            //lib/trait:trait_test \
            //lib/pkg/async/cancellation:cancellation_test \
            //lib/platform/std:std_test

      - name: Build Zig rules tests
        run: bazel build --config=ci //bazel/zig/tests/...

      - name: Test Zig rules
        run: bazel test --config=ci //bazel/zig/tests/...

      - name: Build all std targets
        run: bazel build --config=ci //e2e/ci:build_all_std

      - name: Test std platform
        run: bazel test --config=ci //e2e/ci:test_std

  esp:
    name: ESP cross-compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel-repo
            ~/.cache/bazel-disk
          key: bazel-esp-${{ hashFiles('MODULE.bazel', 'extensions.bzl') }}
          restore-keys: |
            bazel-esp-

      - name: Setup ESP-IDF
        uses: ./.github/actions/esp-idf-setup

      - name: Build all ESP targets
        run: bazel build --config=ci //e2e/ci:build_all_esp
