<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tetris — WebSim</title>
    <style>
:root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2d3245;
    --text: #e1e4ed;
    --text-dim: #7a7f96;
    --accent: #6c8cff;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'SF Mono', 'Fira Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--bg); color: var(--text); font-family: var(--font);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 20px;
}
.header {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 500px; margin-bottom: 16px;
}
.header h1 { font-size: 18px; font-weight: 600; color: var(--text-dim); }
.header .accent { color: var(--accent); }
.status {
    font-size: 12px; font-family: var(--mono); padding: 4px 10px; border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
}
.status.running { color: var(--green); border-color: rgba(74,222,128,0.3); }

.game-area {
    display: flex; gap: 20px; align-items: flex-start;
}
.display-wrap {
    background: #000; border: 2px solid #333; border-radius: 8px; padding: 4px;
}
canvas { display: block; image-rendering: pixelated; }

.controls {
    display: flex; flex-direction: column; gap: 8px; padding-top: 10px;
}
.btn-row { display: flex; gap: 8px; justify-content: center; }
.hw-button {
    appearance: none; border: none; background: #222; border-radius: 6px;
    padding: 0; cursor: pointer; width: 64px; height: 36px;
    transition: transform 0.05s ease; user-select: none;
}
.hw-button:active, .hw-button.pressed { transform: translateY(1px); }
.btn-inner {
    display: flex; align-items: center; justify-content: center; width: 100%; height: 100%;
    border-radius: 6px; background: linear-gradient(180deg, #444 0%, #333 100%);
    border: 1px solid #555; border-bottom: 2px solid #222;
    font-family: var(--mono); font-size: 11px; font-weight: 700; color: #ccc;
}
.hw-button:active .btn-inner, .hw-button.pressed .btn-inner {
    background: linear-gradient(180deg, #333 0%, #444 100%);
    border-bottom: 1px solid #222; color: var(--accent);
}
.key-hint {
    font-size: 9px; color: var(--text-dim); text-align: center; margin-top: 4px;
}

.log-panel {
    width: 100%; max-width: 500px; margin-top: 16px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden;
}
.log-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase;
}
.log-content {
    padding: 8px 12px; font-family: var(--mono); font-size: 11px; line-height: 1.5;
    max-height: 150px; overflow-y: auto; color: var(--text-dim);
}
.log-line.info { color: var(--green); }
.log-line.error { color: var(--red); }
    </style>
</head>
<body>
    <header class="header">
        <h1>Tetris <span class="accent">WebSim</span></h1>
        <span class="status" id="status">Loading...</span>
    </header>

    <div class="game-area">
        <div class="display-wrap">
            <canvas id="displayCanvas" width="240" height="240" style="width:240px;height:240px;"></canvas>
        </div>

        <div class="controls">
            <div class="btn-row">
                <button class="hw-button adc-btn" data-adc="800"><span class="btn-inner">&larr;</span></button>
                <button class="hw-button adc-btn" data-adc="1100"><span class="btn-inner">&rarr;</span></button>
            </div>
            <div class="btn-row">
                <button class="hw-button adc-btn" data-adc="1700"><span class="btn-inner">Rotate</span></button>
            </div>
            <div class="btn-row">
                <button class="hw-button adc-btn" data-adc="500"><span class="btn-inner">&darr; Soft</span></button>
                <button class="hw-button adc-btn" data-adc="200"><span class="btn-inner">&dArr; Hard</span></button>
            </div>
            <div class="btn-row">
                <button class="hw-button adc-btn" data-adc="1400"><span class="btn-inner">Restart</span></button>
            </div>
            <div class="key-hint">&larr;&rarr; move &middot; Enter rotate &middot; &darr; drop &middot; Esc restart</div>
        </div>
    </div>

    <div class="log-panel">
        <div class="log-header"><span>Console</span></div>
        <div class="log-content" id="logContent"></div>
    </div>

    <script>
const App = (() => {
    let running = false;
    let canvasCtx = null, imageData = null;

    function initDisplay() {
        const c = document.getElementById('displayCanvas');
        if (!c) return;
        canvasCtx = c.getContext('2d');
        imageData = canvasCtx.createImageData(c.width, c.height);
    }

    async function updateDisplay() {
        if (!canvasCtx) return;
        try {
            const b64 = await zigGetDisplayFrame();
            if (!b64 || b64.length === 0) return;
            const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
            const c = document.getElementById('displayCanvas');
            const w = c.width, h = c.height;
            const rgba = imageData.data;
            for (let i = 0; i < w * h; i++) {
                const lo = raw[i*2], hi = raw[i*2+1];
                const rgb565 = (hi << 8) | lo;
                rgba[i*4]   = ((rgb565 >> 11) & 0x1F) * 255 / 31 | 0;
                rgba[i*4+1] = ((rgb565 >> 5) & 0x3F) * 255 / 63 | 0;
                rgba[i*4+2] = (rgb565 & 0x1F) * 255 / 31 | 0;
                rgba[i*4+3] = 255;
            }
            canvasCtx.putImageData(imageData, 0, 0);
        } catch(e) {}
    }

    function updateLog(state) {
        if (!state.log_dirty) return;
        const el = document.getElementById('logContent');
        if (!el || !state.logs) return;
        el.innerHTML = state.logs.map(l => {
            let cls = 'log-line';
            if (l.startsWith('[INFO]')) cls += ' info';
            else if (l.startsWith('[ERROR]')) cls += ' error';
            return '<div class="'+cls+'">'+l.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</div>';
        }).join('');
        el.scrollTop = el.scrollHeight;
    }

    function initInput() {
        const btns = document.querySelectorAll('.adc-btn');
        let active = null;
        function setAdc(btn, pressed) {
            if (pressed) {
                if (active && active !== btn) active.classList.remove('pressed');
                active = btn; btn.classList.add('pressed');
                zigSetAdcValue(parseInt(btn.dataset.adc));
            } else {
                if (active === btn) active = null;
                btn.classList.remove('pressed');
                zigSetAdcValue(4095);
            }
        }
        btns.forEach(btn => {
            btn.addEventListener('mousedown', e => { e.preventDefault(); setAdc(btn, true); });
            btn.addEventListener('mouseup', () => setAdc(btn, false));
            btn.addEventListener('mouseleave', () => { if (active === btn) setAdc(btn, false); });
        });
        // Keyboard: arrows=move, Enter=rotate, ArrowDown=soft drop, ArrowUp=hard drop, Escape=restart
        const keyMap = {'ArrowLeft':800,'ArrowRight':1100,'Enter':1700,'ArrowDown':500,'ArrowUp':200,'Escape':1400};
        document.addEventListener('keydown', e => {
            if (e.repeat) return;
            const v = keyMap[e.code];
            if (v !== undefined) { e.preventDefault(); zigSetAdcValue(v);
                btns.forEach(b => { if (parseInt(b.dataset.adc)===v) b.classList.add('pressed'); });
            }
        });
        document.addEventListener('keyup', e => {
            const v = keyMap[e.code];
            if (v !== undefined) { e.preventDefault(); zigSetAdcValue(4095);
                btns.forEach(b => { if (parseInt(b.dataset.adc)===v) b.classList.remove('pressed'); });
            }
        });
    }

    async function frame() {
        if (!running) return;
        try {
            const state = await zigGetState();
            if (state) { updateLog(state); }
            await updateDisplay();
        } catch(e) {}
        requestAnimationFrame(frame);
    }

    return {
        start() {
            initDisplay();
            initInput();
            running = true;
            document.getElementById('status').textContent = 'Running';
            document.getElementById('status').classList.add('running');
            requestAnimationFrame(frame);
        }
    };
})();

App.start();
    </script>
</body>
</html>
